<!DOCTYPE html>
<html lang="en">
<head>
<meta charset="UTF-8"/>
<meta name="viewport" content="width=device-width,initial-scale=1"/>
<title>SpotiFLAC</title>
<link href="https://fonts.googleapis.com/css2?family=Inter:wght@300;400;500;600;700&display=swap" rel="stylesheet">
<style>
:root{
  --bg:#0d0d0d;--surface:#161616;--surface2:#1e1e1e;--border:#2a2a2a;
  --accent:#1db954;--accent-dim:rgba(29,185,84,.12);--accent2:#1aa34a;
  --text:#f0f0f0;--muted:#777;--danger:#e05252;--warn:#e09a52;
  --radius:10px;--font:'Inter',sans-serif;
}
*{margin:0;padding:0;box-sizing:border-box}
body{background:var(--bg);color:var(--text);font-family:var(--font);height:100vh;overflow:hidden;display:flex;flex-direction:column}
/* ── Topbar ── */
.topbar{
  height:52px;min-height:52px;background:var(--surface);border-bottom:1px solid var(--border);
  display:flex;align-items:center;gap:12px;padding:0 16px;
}
.logo{display:flex;align-items:center;gap:8px;font-weight:700;font-size:.95rem;color:var(--accent);white-space:nowrap}
.logo svg{width:22px;height:22px;fill:var(--accent)}
.search-wrap{flex:1;max-width:480px;position:relative}
.search-wrap input{
  width:100%;background:var(--surface2);border:1px solid var(--border);border-radius:8px;
  padding:7px 12px 7px 36px;color:var(--text);font:inherit;font-size:.88rem;outline:none;
  transition:border-color .15s;
}
.search-wrap input:focus{border-color:var(--accent)}
.search-wrap input::placeholder{color:var(--muted)}
.search-icon{position:absolute;left:10px;top:50%;transform:translateY(-50%);color:var(--muted);font-size:.9rem;pointer-events:none}
.url-wrap{display:flex;gap:6px;flex:1}
.url-wrap input{
  flex:1;background:var(--surface2);border:1px solid var(--border);border-radius:8px;
  padding:7px 10px;color:var(--text);font-family:monospace;font-size:.78rem;outline:none;
  transition:border-color .15s;
}
.url-wrap input:focus{border-color:var(--accent)}
.url-wrap input::placeholder{color:var(--muted)}
.btn{
  padding:6px 14px;border-radius:8px;border:none;font:inherit;font-size:.83rem;
  font-weight:600;cursor:pointer;transition:all .15s;white-space:nowrap;
}
.btn-primary{background:var(--accent);color:#000}
.btn-primary:hover{background:var(--accent2)}
.btn-ghost{background:transparent;border:1px solid var(--border);color:var(--muted)}
.btn-ghost:hover{border-color:var(--accent);color:var(--accent)}
.btn-sm{padding:4px 10px;font-size:.75rem}
.btn-danger{background:rgba(224,82,82,.15);border:1px solid var(--danger);color:var(--danger)}
.btn-danger:hover{background:rgba(224,82,82,.25)}
/* ── Body layout ── */
.body{display:flex;flex:1;overflow:hidden}
/* ── Sidebar ── */
.sidebar{
  width:200px;min-width:200px;background:var(--surface);border-right:1px solid var(--border);
  display:flex;flex-direction:column;padding:8px 0;
}
.nav-item{
  display:flex;align-items:center;gap:9px;padding:8px 14px;
  cursor:pointer;color:var(--muted);font-size:.85rem;font-weight:500;
  border-left:2px solid transparent;transition:all .15s;
}
.nav-item:hover{color:var(--text);background:rgba(255,255,255,.03)}
.nav-item.active{color:var(--accent);border-left-color:var(--accent);background:var(--accent-dim)}
.nav-icon{font-size:1rem;width:18px;text-align:center}
.nav-badge{
  margin-left:auto;background:var(--accent);color:#000;
  border-radius:10px;padding:1px 6px;font-size:.65rem;font-weight:700;display:none;
}
.sidebar-bottom{margin-top:auto;padding:10px 14px;border-top:1px solid var(--border)}
.ver-row{display:flex;align-items:center;justify-content:space-between;margin-bottom:6px}
.ver-label{font-size:.68rem;color:var(--muted);font-family:monospace}
.ver-val{font-size:.68rem;color:var(--text);font-family:monospace;font-weight:600}
.ver-badge{
  font-size:.6rem;font-family:monospace;font-weight:700;
  padding:2px 6px;border-radius:4px;text-transform:uppercase;
}
.ver-badge.ok{background:rgba(29,185,84,.15);color:var(--accent)}
.ver-badge.new{background:rgba(224,154,82,.15);color:var(--warn)}
.ver-badge.check{background:rgba(100,100,100,.15);color:var(--muted)}
#btnUpdate{
  width:100%;padding:5px;border-radius:6px;border:1px solid var(--accent);
  background:var(--accent-dim);color:var(--accent);font:inherit;font-size:.75rem;
  font-weight:600;cursor:pointer;display:none;transition:all .15s;
}
#btnUpdate:hover{background:var(--accent);color:#000}
#btnUpdate.visible{display:block}
/* ── Services ── */
.svc-section{padding:10px 14px;border-bottom:1px solid var(--border)}
.svc-label{font-size:.62rem;text-transform:uppercase;letter-spacing:.1em;color:var(--muted);font-weight:600;margin-bottom:6px}
.svc-row{display:flex;align-items:center;gap:7px;padding:2px 0;cursor:pointer;user-select:none}
.svc-row input{accent-color:var(--accent);cursor:pointer}
.svc-row span{font-size:.8rem;color:var(--text)}
/* ── Main content ── */
.main{flex:1;display:flex;flex-direction:column;overflow:hidden}
.content{flex:1;overflow-y:auto;padding:16px}
/* ── Sections ── */
.section{display:none}
.section.active{display:block}
.section-title{font-size:1rem;font-weight:700;margin-bottom:14px;display:flex;align-items:center;gap:8px}
/* ── Search results ── */
.results-grid{display:grid;grid-template-columns:repeat(auto-fill,minmax(160px,1fr));gap:10px}
.card{
  background:var(--surface);border:1px solid var(--border);border-radius:var(--radius);
  padding:10px;cursor:pointer;transition:all .15s;position:relative;overflow:hidden;
}
.card:hover{border-color:var(--accent);transform:translateY(-1px);background:var(--surface2)}
.card img,.card .no-img{
  width:100%;aspect-ratio:1;border-radius:7px;object-fit:cover;
  background:var(--surface2);margin-bottom:8px;display:block;
}
.card .no-img{display:flex;align-items:center;justify-content:center;font-size:2rem}
.card-type{font-size:.6rem;font-family:monospace;text-transform:uppercase;letter-spacing:.1em;color:var(--accent);font-weight:700;margin-bottom:2px}
.card-name{font-size:.82rem;font-weight:600;white-space:nowrap;overflow:hidden;text-overflow:ellipsis;margin-bottom:2px}
.card-sub{font-size:.72rem;color:var(--muted);white-space:nowrap;overflow:hidden;text-overflow:ellipsis}
.play-btn{
  position:absolute;bottom:46px;right:8px;width:32px;height:32px;
  background:var(--accent);border-radius:50%;display:flex;align-items:center;
  justify-content:center;opacity:0;transform:translateY(4px);
  transition:all .2s;border:none;cursor:pointer;font-size:.85rem;color:#000;
}
.card:hover .play-btn{opacity:1;transform:translateY(0)}
.dl-btn{
  position:absolute;top:6px;right:6px;width:26px;height:26px;
  background:rgba(0,0,0,.7);border-radius:50%;display:flex;align-items:center;
  justify-content:center;opacity:0;transition:opacity .15s;border:none;cursor:pointer;
  font-size:.8rem;color:var(--text);
}
.card:hover .dl-btn{opacity:1}
.dl-btn:hover{background:var(--accent);color:#000}
/* ── Preview card ── */
.preview-card{
  background:var(--surface);border:1px solid var(--border);border-radius:var(--radius);
  padding:14px;display:flex;gap:14px;align-items:flex-start;margin-bottom:16px;
}
.preview-card img{width:80px;height:80px;border-radius:7px;object-fit:cover;background:var(--surface2);flex-shrink:0}
.preview-info{flex:1;min-width:0}
.preview-type{font-size:.62rem;font-family:monospace;text-transform:uppercase;color:var(--accent);font-weight:700;margin-bottom:3px}
.preview-name{font-size:1rem;font-weight:700;margin-bottom:3px;overflow:hidden;text-overflow:ellipsis;white-space:nowrap}
.preview-meta{font-size:.8rem;color:var(--muted);margin-bottom:10px}
.preview-actions{display:flex;gap:7px;align-items:center;flex-wrap:wrap}
audio{height:28px;border-radius:5px;max-width:180px;filter:invert(.8) hue-rotate(100deg)}
/* ── Album detail ── */
.album-header{display:flex;gap:16px;align-items:flex-start;margin-bottom:16px;padding-bottom:16px;border-bottom:1px solid var(--border)}
.album-header img{width:110px;height:110px;border-radius:8px;object-fit:cover;background:var(--surface2);flex-shrink:0}
.album-header-info{flex:1;min-width:0}
.album-header-info h2{font-size:1.2rem;font-weight:700;margin-bottom:4px;overflow:hidden;text-overflow:ellipsis;white-space:nowrap}
.album-header-info p{font-size:.85rem;color:var(--muted);margin-bottom:10px}
.track-list-header{
  display:grid;grid-template-columns:36px 1fr auto 50px;
  gap:8px;padding:4px 8px 8px;border-bottom:1px solid var(--border);
  font-size:.68rem;text-transform:uppercase;letter-spacing:.08em;color:var(--muted);font-weight:600;
}
.track-row{
  display:grid;grid-template-columns:36px 1fr auto 50px;
  gap:8px;padding:7px 8px;border-radius:6px;align-items:center;cursor:default;
  transition:background .1s;
}
.track-row:hover{background:var(--surface2)}
.track-num{font-size:.8rem;color:var(--muted);text-align:center;font-family:monospace}
.track-info{min-width:0}
.track-title{font-size:.85rem;font-weight:500;overflow:hidden;text-overflow:ellipsis;white-space:nowrap}
.track-artist{font-size:.75rem;color:var(--muted);overflow:hidden;text-overflow:ellipsis;white-space:nowrap}
.track-dur{font-size:.75rem;color:var(--muted);font-family:monospace;text-align:right}
.track-actions{display:flex;gap:4px;justify-content:flex-end}
.icon-btn{
  width:26px;height:26px;border-radius:50%;border:none;background:transparent;
  color:var(--muted);cursor:pointer;display:flex;align-items:center;justify-content:center;
  font-size:.8rem;transition:all .15s;
}
.icon-btn:hover{background:var(--accent-dim);color:var(--accent)}
/* ── Queue ── */
.queue-list{display:flex;flex-direction:column;gap:8px}
.queue-item{
  background:var(--surface);border:1px solid var(--border);border-radius:var(--radius);
  padding:10px 12px;display:flex;align-items:center;gap:10px;
}
.q-dot{width:7px;height:7px;border-radius:50%;flex-shrink:0}
.q-dot.queued{background:var(--muted)}
.q-dot.downloading{background:var(--warn);animation:pulse 1s infinite}
.q-dot.done{background:var(--accent)}
.q-dot.partial{background:var(--warn)}
.q-dot.error{background:var(--danger)}
.q-info{flex:1;min-width:0}
.q-url{font-family:monospace;font-size:.72rem;color:var(--muted);overflow:hidden;text-overflow:ellipsis;white-space:nowrap}
.q-track{font-size:.72rem;color:var(--accent);margin-top:2px;overflow:hidden;text-overflow:ellipsis;white-space:nowrap}
.q-progress{font-size:.7rem;color:var(--muted);margin-top:1px}
.q-state{font-family:monospace;font-size:.72rem;font-weight:700;white-space:nowrap}
.q-state.queued{color:var(--muted)}.q-state.downloading{color:var(--warn)}
.q-state.done{color:var(--accent)}.q-state.partial{color:var(--warn)}.q-state.error{color:var(--danger)}
.q-errors{
  font-size:.72rem;color:var(--danger);padding:6px 12px 6px 30px;
  background:rgba(224,82,82,.05);border-top:1px solid rgba(224,82,82,.12);
  border-radius:0 0 var(--radius) var(--radius);
}
/* ── Mini player ── */
.mini-player{
  height:52px;background:var(--surface);border-top:1px solid var(--border);
  display:none;align-items:center;gap:10px;padding:0 14px;
}
.mini-player.on{display:flex}
.mini-player img{width:36px;height:36px;border-radius:5px;object-fit:cover}
.mp-info{flex:1;min-width:0}
.mp-name{font-size:.82rem;font-weight:600;overflow:hidden;text-overflow:ellipsis;white-space:nowrap}
.mp-artist{font-size:.72rem;color:var(--muted)}
.mp-close{cursor:pointer;color:var(--muted);padding:4px;font-size:.9rem}
.mp-close:hover{color:var(--text)}
/* ── Toast ── */
.toasts{position:fixed;bottom:60px;right:14px;display:flex;flex-direction:column;gap:6px;z-index:999}
.toast{
  background:var(--surface2);border:1px solid var(--border);border-radius:8px;
  padding:8px 12px;font-size:.8rem;display:flex;align-items:center;gap:7px;
  animation:slideIn .25s ease;max-width:280px;
}
.toast.ok{border-color:var(--accent)}.toast.err{border-color:var(--danger)}
/* ── Empty ── */
.empty{text-align:center;padding:60px 20px;color:var(--muted)}
.empty .ei{font-size:2.5rem;margin-bottom:10px;opacity:.4}
.empty p{font-size:.88rem}
/* ── Spinner / loading ── */
.spinner{width:16px;height:16px;border:2px solid var(--border);border-top-color:var(--accent);border-radius:50%;animation:spin .6s linear infinite;flex-shrink:0}
.skeleton{background:var(--surface);border:1px solid var(--border);border-radius:var(--radius);padding:10px;animation:shimmer 1.4s infinite}
.sk-img{width:100%;aspect-ratio:1;border-radius:7px;background:var(--surface2);margin-bottom:8px}
.sk-line{height:9px;border-radius:4px;background:var(--surface2);margin-bottom:5px}
.sk-line.s{width:60%}
/* ── Scrollbar ── */
::-webkit-scrollbar{width:5px}::-webkit-scrollbar-track{background:transparent}
::-webkit-scrollbar-thumb{background:var(--border);border-radius:3px}
::-webkit-scrollbar-thumb:hover{background:var(--muted)}
@keyframes spin{to{transform:rotate(360deg)}}
@keyframes pulse{0%,100%{opacity:1}50%{opacity:.4}}
@keyframes slideIn{from{opacity:0;transform:translateX(16px)}to{opacity:1;transform:translateX(0)}}
@keyframes shimmer{0%,100%{opacity:1}50%{opacity:.5}}
</style>
</head>
<body>
<!-- Topbar -->
<div class="topbar">
  <div class="logo">
    <svg viewBox="0 0 24 24"><path d="M12 2C6.48 2 2 6.48 2 12s4.48 10 10 10 10-4.48 10-10S17.52 2 12 2zm-2 14.5v-9l6 4.5-6 4.5z"/></svg>
    SpotiFLAC
  </div>
  <div class="search-wrap">
    <span class="search-icon">🔍</span>
    <input id="searchInput" type="text" placeholder="Search tracks, albums, artists…" autocomplete="off"/>
  </div>
  <div class="url-wrap">
    <input id="urlInput" type="text" placeholder="Paste Spotify URL…"/>
    <button class="btn btn-ghost" onclick="previewUrl()">Preview</button>
    <button class="btn btn-primary" onclick="downloadUrl()">⬇ Download</button>
  </div>
</div>

<!-- Body -->
<div class="body">
  <!-- Sidebar -->
  <aside class="sidebar">
    <div class="nav-item active" id="nav-search" onclick="showSection('search')">
      <span class="nav-icon">🔍</span> Search
    </div>
    <div class="nav-item" id="nav-url" onclick="showSection('url')">
      <span class="nav-icon">🔗</span> Paste URL
    </div>
    <div class="nav-item" id="nav-queue" onclick="showSection('queue')">
      <span class="nav-icon">📥</span> Downloads
      <span class="nav-badge" id="qBadge"></span>
    </div>

    <div class="svc-section">
      <div class="svc-label">Source priority</div>
      <label class="svc-row"><input type="checkbox" id="svc-tidal" checked><span>Tidal</span></label>
      <label class="svc-row"><input type="checkbox" id="svc-qobuz" checked><span>Qobuz</span></label>
      <label class="svc-row"><input type="checkbox" id="svc-amazon" checked><span>Amazon</span></label>
    </div>

    <div class="sidebar-bottom">
      <div class="ver-row">
        <span class="ver-label">SpotiFLAC</span>
        <span class="ver-val" id="vInstalled">…</span>
      </div>
      <div class="ver-row">
        <span class="ver-label">Latest</span>
        <span class="ver-val" id="vLatest">…</span>
        <span class="ver-badge check" id="vBadge">…</span>
      </div>
      <button id="btnUpdate" onclick="doUpdate()">⬆ Update</button>
    </div>
  </aside>

  <!-- Main -->
  <div class="main">
    <div class="content">

      <!-- Search section -->
      <div class="section active" id="section-search">
        <div id="searchResults">
          <div class="empty"><div class="ei">🎵</div><p>Search for tracks, albums or artists above</p></div>
        </div>
      </div>

      <!-- URL / preview section -->
      <div class="section" id="section-url">
        <div class="section-title">🔗 Spotify URL</div>
        <p style="color:var(--muted);font-size:.85rem;margin-bottom:14px">Paste any Spotify track, album, playlist or artist URL above and click <strong>Preview</strong>.</p>
        <div id="urlPreview"></div>
      </div>

      <!-- Album detail section -->
      <div class="section" id="section-album">
        <div id="albumDetail"></div>
      </div>

      <!-- Queue section -->
      <div class="section" id="section-queue">
        <div class="section-title">📥 Downloads</div>
        <div id="queueList">
          <div class="empty"><div class="ei">📭</div><p>No downloads yet</p></div>
        </div>
      </div>

    </div>

    <!-- Mini player -->
    <div class="mini-player" id="miniPlayer">
      <img id="mpCover" src="" alt=""/>
      <div class="mp-info">
        <div class="mp-name" id="mpName"></div>
        <div class="mp-artist" id="mpArtist"></div>
      </div>
      <audio id="mpAudio" controls></audio>
      <span class="mp-close" onclick="closePlayer()">✕</span>
    </div>
  </div>
</div>

<div class="toasts" id="toasts"></div>

<script>
// ── Utils ─────────────────────────────────────────────────────────────────────
const esc = s => (s||'').replace(/&/g,'&amp;').replace(/</g,'&lt;').replace(/>/g,'&gt;').replace(/"/g,'&quot;');
const fmt = ms => { const s=Math.floor(ms/1000); return `${Math.floor(s/60)}:${String(s%60).padStart(2,'0')}` };
const fmtTime = ts => ts ? new Date(ts*1000).toLocaleTimeString() : '';
const fmtN = n => n ? n.toLocaleString() : '';

function toast(msg, type='info'){
  const el = document.createElement('div');
  el.className = `toast ${type==='ok'?'ok':type==='err'?'err':''}`;
  el.innerHTML = `${type==='ok'?'✅':type==='err'?'❌':'ℹ️'} ${msg}`;
  document.getElementById('toasts').appendChild(el);
  setTimeout(()=>el.remove(), 4000);
}

function services(){
  return ['tidal','qobuz','amazon'].filter(s=>document.getElementById('svc-'+s).checked);
}

// ── Sections ──────────────────────────────────────────────────────────────────
function showSection(name){
  document.querySelectorAll('.section').forEach(s=>s.classList.remove('active'));
  document.querySelectorAll('.nav-item').forEach(n=>n.classList.remove('active'));
  document.getElementById('section-'+name).classList.add('active');
  document.getElementById('nav-'+name)?.classList.add('active');
}

// ── Search ────────────────────────────────────────────────────────────────────
let searchTimer=null;
document.getElementById('searchInput').addEventListener('input', e=>{
  clearTimeout(searchTimer);
  const q = e.target.value.trim();
  if(!q){ document.getElementById('searchResults').innerHTML='<div class="empty"><div class="ei">🎵</div><p>Search for tracks, albums or artists above</p></div>'; return; }
  showSection('search');
  searchTimer = setTimeout(()=>doSearch(q), 380);
});
document.getElementById('searchInput').addEventListener('keydown', e=>{ if(e.key==='Enter'){ clearTimeout(searchTimer); const q=e.target.value.trim(); if(q) doSearch(q); } });

async function doSearch(q){
  document.getElementById('searchResults').innerHTML = `<div class="results-grid">${[...Array(8)].map(()=>'<div class="skeleton"><div class="sk-img"></div><div class="sk-line"></div><div class="sk-line s"></div></div>').join('')}</div>`;
  try{
    const res = await fetch(`/api/search?q=${encodeURIComponent(q)}`);
    const data = await res.json();
    if(data.error){ document.getElementById('searchResults').innerHTML=`<div class="empty"><div class="ei">❌</div><p>${esc(data.error)}</p></div>`; return; }
    if(!data.length){ document.getElementById('searchResults').innerHTML=`<div class="empty"><div class="ei">🔍</div><p>No results for "${esc(q)}"</p></div>`; return; }
    renderCards(data, 'searchResults');
  }catch(e){ document.getElementById('searchResults').innerHTML=`<div class="empty"><div class="ei">❌</div><p>Search failed: ${esc(e.message)}</p></div>`; }
}

function renderCards(items, containerId){
  const icons = {track:'🎵',album:'💿',artist:'🎤',playlist:'📃'};
  const html = '<div class="results-grid">'+items.map(item=>{
    const cover = item.cover ? `<img src="${esc(item.cover)}" loading="lazy" alt="">` : `<div class="no-img">${icons[item.type]||'🎵'}</div>`;
    const sub = item.type==='track' ? `${esc(item.artist)} · ${fmt(item.duration_ms)}`
               : item.type==='album' ? `${esc(item.artist)} · ${item.year||''} · ${item.track_count} tracks`
               : item.type==='artist' ? `${fmtN(item.followers)} followers`
               : `${esc(item.artist||'')} · ${item.track_count||0} tracks`;
    const playBtn = item.preview_url
      ? `<button class="play-btn" onclick="event.stopPropagation();playPreview('${esc(item.preview_url)}','${esc(item.name)}','${esc(item.artist||'')}','${esc(item.cover||'')}')">▶</button>` : '';
    const onClick = item.type==='album'
      ? `openAlbum('${esc(item.id)}')`
      : `selectItem(${JSON.stringify(JSON.stringify(item))})`;
    return `<div class="card" onclick="${onClick}">
      ${cover}
      <div class="card-type">${item.type}</div>
      <div class="card-name" title="${esc(item.name)}">${esc(item.name)}</div>
      <div class="card-sub">${sub}</div>
      ${playBtn}
      <button class="dl-btn" title="Download" onclick="event.stopPropagation();startDownload('${esc(item.url)}')">⬇</button>
    </div>`;
  }).join('')+'</div>';
  document.getElementById(containerId).innerHTML = html;
}

function selectItem(jsonStr){
  const item = JSON.parse(jsonStr);
  document.getElementById('urlInput').value = item.url;
  renderPreview(item);
  showSection('url');
}

// ── Album detail ──────────────────────────────────────────────────────────────
async function openAlbum(aid){
  showSection('album');
  document.getElementById('albumDetail').innerHTML = '<div style="display:flex;gap:8px;align-items:center;padding:20px;color:var(--muted)"><div class="spinner"></div> Loading album…</div>';
  try{
    const res = await fetch(`/api/album/${aid}`);
    const alb = await res.json();
    if(alb.error){ document.getElementById('albumDetail').innerHTML=`<div class="empty"><div class="ei">❌</div><p>${esc(alb.error)}</p></div>`; return; }
    renderAlbum(alb);
  }catch(e){
    document.getElementById('albumDetail').innerHTML=`<div class="empty"><div class="ei">❌</div><p>${esc(e.message)}</p></div>`;
  }
}

function renderAlbum(alb){
  const albumUrl = `https://open.spotify.com/album/${alb.id}`;
  let html = `
  <div class="album-header">
    ${alb.cover ? `<img src="${esc(alb.cover)}" alt="">` : '<div style="width:110px;height:110px;background:var(--surface2);border-radius:8px;display:flex;align-items:center;justify-content:center;font-size:2.5rem;flex-shrink:0">💿</div>'}
    <div class="album-header-info">
      <h2>${esc(alb.name)}</h2>
      <p>${esc(alb.artist)} · ${alb.year||''} · ${alb.total_tracks} tracks</p>
      <div style="display:flex;gap:7px;flex-wrap:wrap">
        <button class="btn btn-primary btn-sm" onclick="startDownload('${esc(albumUrl)}')">⬇ Download All</button>
        <button class="btn btn-ghost btn-sm" onclick="history.back();showSection('search')">← Back</button>
      </div>
    </div>
  </div>
  <div class="track-list-header"><span>#</span><span>Title</span><span>Duration</span><span></span></div>`;

  alb.tracks.forEach(t=>{
    html += `<div class="track-row">
      <div class="track-num">${t.track_number}</div>
      <div class="track-info">
        <div class="track-title">${esc(t.name)}${t.explicit?' <span style="font-size:.6rem;background:var(--border);padding:1px 4px;border-radius:3px;color:var(--muted)">E</span>':''}</div>
        <div class="track-artist">${esc(t.artist)}</div>
      </div>
      <div class="track-dur">${fmt(t.duration_ms)}</div>
      <div class="track-actions">
        ${t.preview_url ? `<button class="icon-btn" title="Preview" onclick="playPreview('${esc(t.preview_url)}','${esc(t.name)}','${esc(t.artist)}','${esc(alb.cover||'')}')">▶</button>` : ''}
        <button class="icon-btn" title="Download this track" onclick="startDownload('${esc(t.url)}')">⬇</button>
      </div>
    </div>`;
  });

  document.getElementById('albumDetail').innerHTML = html;
}

// ── URL preview ───────────────────────────────────────────────────────────────
async function previewUrl(){
  const url = document.getElementById('urlInput').value.trim();
  if(!url){ toast('Paste a Spotify URL first','err'); return; }
  showSection('url');
  document.getElementById('urlPreview').innerHTML = '<div style="display:flex;gap:8px;align-items:center;padding:10px 0;color:var(--muted)"><div class="spinner"></div> Looking up…</div>';
  try{
    const res = await fetch(`/api/lookup?url=${encodeURIComponent(url)}`);
    const data = await res.json();
    if(data.error){ toast(data.error,'err'); document.getElementById('urlPreview').innerHTML=''; return; }
    // If album, offer to view track list
    if(data.type==='album') data._showAlbum = true;
    renderPreview(data);
  }catch(e){ toast(e.message,'err'); }
}

function renderPreview(item){
  const icons = {track:'🎵',album:'💿',artist:'🎤',playlist:'📃'};
  const cover = item.cover ? `<img src="${esc(item.cover)}" alt="">` : `<div style="width:80px;height:80px;border-radius:7px;background:var(--surface2);display:flex;align-items:center;justify-content:center;font-size:2rem">${icons[item.type]||'🎵'}</div>`;
  let meta = '';
  if(item.type==='track') meta = `${item.artist} · ${item.album} · ${fmt(item.duration_ms)}`;
  if(item.type==='album') meta = `${item.artist} · ${item.year||''} · ${item.track_count} tracks`;
  if(item.type==='playlist') meta = `by ${item.artist} · ${item.track_count} tracks`;
  if(item.type==='artist') meta = `${fmtN(item.followers)} followers`;
  const preview = item.preview_url ? `<audio controls src="${esc(item.preview_url)}"></audio>` : '';
  const albumBtn = item.type==='album' ? `<button class="btn btn-ghost btn-sm" onclick="openAlbum('${esc(item.id)}')">View Tracks</button>` : '';
  document.getElementById('urlPreview').innerHTML = `
    <div class="preview-card">
      ${cover}
      <div class="preview-info">
        <div class="preview-type">${item.type}</div>
        <div class="preview-name">${esc(item.name)}</div>
        <div class="preview-meta">${esc(meta)}</div>
        <div class="preview-actions">
          ${preview}
          <button class="btn btn-primary btn-sm" onclick="startDownload('${esc(item.url)}')">⬇ Download</button>
          ${albumBtn}
          <a href="${esc(item.url)}" target="_blank" class="btn btn-ghost btn-sm" style="text-decoration:none">Open ↗</a>
        </div>
      </div>
    </div>`;
}

async function downloadUrl(){
  const url = document.getElementById('urlInput').value.trim();
  if(!url){ toast('Paste a Spotify URL first','err'); return; }
  await startDownload(url);
}

// ── Download ──────────────────────────────────────────────────────────────────
async function startDownload(url){
  const svcs = services();
  if(!svcs.length){ toast('Select at least one source','err'); return; }
  try{
    const res = await fetch('/api/download',{
      method:'POST',headers:{'Content-Type':'application/json'},
      body:JSON.stringify({url,services:svcs})
    });
    const data = await res.json();
    if(data.error){ toast(data.error,'err'); return; }
    toast(`Queued — job ${data.job_id}`,'ok');
    refreshQueue();
  }catch(e){ toast(e.message,'err'); }
}

// ── Queue ─────────────────────────────────────────────────────────────────────
async function refreshQueue(){
  try{
    const res = await fetch('/api/jobs');
    const jobs = await res.json();
    const active = jobs.filter(j=>j.status==='downloading'||j.status==='queued').length;
    const badge = document.getElementById('qBadge');
    badge.textContent = active;
    badge.style.display = active ? 'inline' : 'none';
    if(document.getElementById('section-queue').classList.contains('active')){
      renderQueue(jobs);
    }
  }catch{}
}

function renderQueue(jobs){
  if(!jobs.length){
    document.getElementById('queueList').innerHTML='<div class="empty"><div class="ei">📭</div><p>No downloads yet</p></div>';
    return;
  }
  let html = '<div class="queue-list">';
  for(const j of jobs){
    const errs = (j.errors||[]).slice(0,4).map(e=>`<div>• ${esc(e)}</div>`).join('');
    html += `<div>
      <div class="queue-item">
        <div class="q-dot ${j.status}"></div>
        <div class="q-info">
          <div class="q-url" title="${esc(j.url)}">${esc(j.url.length>55?j.url.slice(0,55)+'…':j.url)}</div>
          ${j.current_track?`<div class="q-track">▶ ${esc(j.current_track)}</div>`:''}
          ${j.total>0?`<div class="q-progress">${j.done}/${j.total} tracks${j.failed>0?` · <span style="color:var(--danger)">${j.failed} failed</span>`:' ✅'}</div>`:''}
        </div>
        <span style="font-size:.68rem;color:var(--muted);white-space:nowrap">${fmtTime(j.started_at||j.created_at)}</span>
        <div class="q-state ${j.status}">${j.status.toUpperCase()}</div>
      </div>
      ${(j.error||errs)?`<div class="q-errors">${j.error?`<div style="font-weight:600">${esc(j.error)}</div>`:''}${errs}${(j.errors||[]).length>4?`<div style="opacity:.6">…+${j.errors.length-4} more</div>`:''}</div>`:''}
    </div>`;
  }
  html += '</div>';
  document.getElementById('queueList').innerHTML = html;
}

// ── Mini player ───────────────────────────────────────────────────────────────
function playPreview(url, name, artist, cover){
  document.getElementById('mpName').textContent = name;
  document.getElementById('mpArtist').textContent = artist;
  document.getElementById('mpCover').src = cover||'';
  document.getElementById('mpCover').style.display = cover ? 'block' : 'none';
  const a = document.getElementById('mpAudio');
  a.src = url; a.play();
  document.getElementById('miniPlayer').classList.add('on');
}
function closePlayer(){
  document.getElementById('mpAudio').pause();
  document.getElementById('miniPlayer').classList.remove('on');
}

// ── Version check ─────────────────────────────────────────────────────────────
async function checkVersion(){
  try{
    const d = await fetch('/api/version').then(r=>r.json());
    document.getElementById('vInstalled').textContent = d.installed||'?';
    document.getElementById('vLatest').textContent = d.latest||'?';
    const badge = document.getElementById('vBadge');
    const btn = document.getElementById('btnUpdate');
    if(d.update_available){
      badge.textContent='Update'; badge.className='ver-badge new';
      btn.classList.add('visible');
    } else {
      badge.textContent='Up to date'; badge.className='ver-badge ok';
      btn.classList.remove('visible');
    }
  }catch{}
}
async function doUpdate(){
  const btn = document.getElementById('btnUpdate');
  btn.disabled=true; btn.textContent='Updating…';
  await fetch('/api/update',{method:'POST'});
  toast('Update started — check back in ~15s','ok');
  setTimeout(()=>{ checkVersion(); btn.disabled=false; btn.textContent='⬆ Update'; }, 15000);
}

// ── Init ──────────────────────────────────────────────────────────────────────
document.getElementById('urlInput').addEventListener('keydown', e=>{ if(e.key==='Enter') previewUrl(); });
document.getElementById('nav-queue').addEventListener('click', ()=>refreshQueue());
setInterval(refreshQueue, 3000);
checkVersion();
setInterval(checkVersion, 600000);

// nav-album not in sidebar but we still need it tracked
document.getElementById('section-album').addEventListener('click', ()=>{});
</script>
</body>
</html>
