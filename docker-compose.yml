services:
  spotiflac-ui:
    image: ghcr.io/sidcancode/spotiflac-webui:latest
    container_name: spotiflac-ui
    ports:
      - "7171:7171"
    environment:
      - SPOTIFY_CLIENT_ID=your_client_id
      - SPOTIFY_CLIENT_SECRET=your_client_secret
      - DOWNLOAD_DIR=/downloads
      - CONFIG_FILE=/config/settings.json
    volumes:
      - /mnt/rpi5-hdd/music:/downloads
      - ./config:/config
    restart: unless-stopped
